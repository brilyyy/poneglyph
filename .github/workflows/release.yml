name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build viewer
        run: |
          pnpm -C viewer install --frozen-lockfile
          pnpm -C viewer build

      - name: Build release binary
        run: cargo build --release --features viewer --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          gzip -c "target/${{ matrix.target }}/release/poneglyph" > "poneglyph-${{ matrix.target }}.gz"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          gzip -c "target/${{ matrix.target }}/release/poneglyph.exe" > "poneglyph-${{ matrix.target }}.exe.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: poneglyph-${{ matrix.target }}
          path: poneglyph-${{ matrix.target }}*.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.gz
          generate_release_notes: true
