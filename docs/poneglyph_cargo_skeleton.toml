# =============================================================================
# crates/memagent-http
# =============================================================================
# [package]
# name    = "memagent-http"
# version = "0.1.0"
# edition = "2021"
#
# [dependencies]
# memagent-core  = { path = "../memagent-core" }
# axum           = { workspace = true }
# tower          = { workspace = true }
# tower-http     = { workspace = true }
# rust-embed     = { workspace = true }
# tokio          = { workspace = true }
# serde          = { workspace = true }
# serde_json     = { workspace = true }
# anyhow         = { workspace = true }
# tracing        = { workspace = true }
#
# ── Two responsibilities ─────────────────────────────────────────────────────
# 1. /ingest  POST endpoint → passive capture from Claude Code hooks, opencode
#             plugins, or any HTTP-capable client shim.
#             A Claude Code hook is literally: curl -s -X POST localhost:3001/ingest \
#                 -H "Content-Type: application/json" \
#                 -d '{"event":"tool_use","tool":"Bash","content":"..."}'
#
# 2. /api/*   REST endpoints for the TanStack Start viewer (memories, graph,
#             search, settings). Same core, different surface.
#
# Static viewer files embedded at compile time via rust-embed.


# =============================================================================
# crates/memagent-cli
# =============================================================================
# [package]
# name    = "memagent-cli"
# version = "0.1.0"
# edition = "2021"
#
# [[bin]]
# name = "memagent"
# path = "src/main.rs"
#
# [dependencies]
# memagent-core  = { path = "../memagent-core" }
# memagent-mcp   = { path = "../memagent-mcp" }
# memagent-http  = { path = "../memagent-http" }
# tokio          = { workspace = true }
# clap           = { workspace = true }
# figment        = { workspace = true }
# tracing        = { workspace = true }
# tracing-subscriber = { workspace = true }
# anyhow         = { workspace = true }
#
# ── CLI commands ─────────────────────────────────────────────────────────────
# memagent serve          → spawns MCP stdio server + HTTP server concurrently
# memagent remember "..."  → one-shot CLI capture
# memagent recall "..."    → one-shot CLI search
# memagent forget <id>     → delete
# memagent export          → dump memories as JSON/Markdown


# =============================================================================
# Recommended default embedding model
# =============================================================================
# BAAI/bge-small-en-v1.5   — 384d, ~33MB, strong retrieval, fast CPU inference
#   embed_anything code:
#     let embedder = EmbedderBuilder::new()
#         .model_architecture("bert")
#         .model_id(Some("BAAI/bge-small-en-v1.5"))
#         .from_pretrained_hf()?;
#
# Easy upgrade path (same 384d, same sqlite-vec schema, just change model_id):
#   nomic-ai/nomic-embed-text-v1.5   — better long-context
#   BAAI/bge-m3                      — multilingual (relevant for BTN use cases)
#   answerdotai/ModernBERT-base      — newer architecture, supported by embed_anything


# =============================================================================
# What was deliberately removed from the original design doc
# =============================================================================
# ✗ SurrealDB        → replaced by plain edges table in SQLite (simpler, same file)
# ✗ Tonic/gRPC       → not needed at single-machine scale; axum JSON is fine
# ✗ Protobuf         → same reason; serde_json is plenty fast
# ✗ MessagePack      → same reason
# ✗ ONNX Runtime     → replaced by embed_anything candle backend (pure Rust)
# ✗ Cloud tier       → deferred; StorageBackend trait keeps the door open
# ✗ Custom JSON-RPC  → replaced by rmcp (official SDK, 1.x, handles transport)
# ✗ HTTP+SSE transport → deprecated since MCP spec 2025-03-26; use stdio locally
